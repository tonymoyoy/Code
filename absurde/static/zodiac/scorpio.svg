<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="128" height="128" fill="url(#bgGrad)"/>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#e0e0e0" stroke-width="1" opacity="0.5"/>
  <!-- Scorpion constellation -->
  <circle cx="35" cy="50" r="3" fill="#ffd700"/>
  <circle cx="50" cy="45" r="3" fill="#ffd700"/>
  <circle cx="65" cy="40" r="3" fill="#ffed4e"/>
  <circle cx="75" cy="45" r="3" fill="#ffd700"/>
  <circle cx="85" cy="55" r="2.5" fill="#ffd700"/>
  <!-- Body -->
  <circle cx="60" cy="70" r="3" fill="#ffed4e"/>
  <circle cx="58" cy="85" r="3" fill="#ffed4e"/>
  <!-- Tail curve -->
  <circle cx="62" cy="98" r="2.5" fill="#ffd700"/>
  <path d="M 60 70 Q 55 80 58 88 Q 60 95 62 100" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.7"/>
  <!-- Head connections -->
  <line x1="35" y1="50" x2="50" y2="45" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="45" x2="65" y2="40" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="65" y1="40" x2="75" y2="45" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="75" y1="45" x2="85" y2="55" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="65" y1="40" x2="60" y2="70" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
  <!-- Scorpio symbol -->
  <text x="64" y="120" font-size="32" font-weight="bold" text-anchor="middle" fill="#1a1a1a">♏</text>
</svg>