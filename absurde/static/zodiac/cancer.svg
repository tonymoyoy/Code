  <line x1="50" y1="45" x2="55" y2="65" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="65" y1="40" x2="64" y2="80" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="78" y1="45" x2="73" y2="65" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="55" y1="65" x2="73" y2="65" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
  <line x1="55" y1="65" x2="64" y2="80" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
