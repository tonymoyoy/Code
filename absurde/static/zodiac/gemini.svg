<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="128" height="128" fill="url(#bgGrad)"/>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#e0e0e0" stroke-width="1" opacity="0.5"/>
  <!-- Left twin constellation -->
  <circle cx="35" cy="40" r="3" fill="#ffd700"/>
  <circle cx="40" cy="55" r="3" fill="#ffd700"/>
  <circle cx="35" cy="70" r="3" fill="#ffd700"/>
  <line x1="35" y1="40" x2="40" y2="55" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="40" y1="55" x2="35" y2="70" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <!-- Right twin constellation -->
  <circle cx="93" cy="40" r="3" fill="#ffd700"/>
  <circle cx="88" cy="55" r="3" fill="#ffd700"/>
  <circle cx="93" cy="70" r="3" fill="#ffd700"/>
  <line x1="93" y1="40" x2="88" y2="55" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="88" y1="55" x2="93" y2="70" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <!-- Connection line -->
  <line x1="45" y1="55" x2="78" y2="55" stroke="#ffd700" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
  <!-- Gemini symbol -->
  <text x="64" y="105" font-size="36" font-weight="bold" text-anchor="middle" fill="#1a1a1a">♊</text>
</svg>