<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="128" height="128" fill="url(#bgGrad)"/>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#e0e0e0" stroke-width="1" opacity="0.5"/>
  <!-- Balance scales constellation -->
  <!-- Fulcrum -->
  <circle cx="64" cy="50" r="2.5" fill="#ffed4e"/>
  <!-- Left scale -->
  <line x1="40" y1="50" x2="64" y2="50" stroke="#ffd700" stroke-width="2" opacity="0.7"/>
  <circle cx="38" cy="50" r="2.5" fill="#ffd700"/>
  <circle cx="35" cy="70" r="3" fill="#ffd700"/>
  <circle cx="38" cy="75" r="2.5" fill="#ffd700"/>
  <line x1="38" y1="50" x2="38" y2="70" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="38" y1="70" x2="35" y2="70" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
  <!-- Right scale -->
  <line x1="64" y1="50" x2="88" y2="50" stroke="#ffd700" stroke-width="2" opacity="0.7"/>
  <circle cx="90" cy="50" r="2.5" fill="#ffd700"/>
  <circle cx="93" cy="70" r="3" fill="#ffd700"/>
  <circle cx="90" cy="75" r="2.5" fill="#ffd700"/>
  <line x1="90" y1="50" x2="90" y2="70" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="90" y1="70" x2="93" y2="70" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
  <!-- Stand -->
  <line x1="64" y1="50" x2="64" y2="85" stroke="#ffd700" stroke-width="2" opacity="0.6"/>
  <!-- Libra symbol -->
  <text x="64" y="108" font-size="36" font-weight="bold" text-anchor="middle" fill="#1a1a1a">♎</text>
</svg>