<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="128" height="128" fill="url(#bgGrad)"/>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <!-- Sea-goat constellation -->
  <!-- Head -->
  <circle cx="50" cy="35" r="3" fill="#ffd700"/>
  <circle cx="60" cy="30" r="2.5" fill="#ffd700"/>
  <circle cx="70" cy="35" r="3" fill="#ffed4e"/>
  <!-- Horns -->
  <line x1="50" y1="35" x2="45" y2="20" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="70" y1="35" x2="75" y2="20" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <!-- Front body -->
  <circle cx="65" cy="55" r="3" fill="#ffed4e"/>
  <circle cx="58" cy="70" r="3" fill="#ffed4e"/>
  <!-- Fish tail -->
  <circle cx="62" cy="85" r="3" fill="#ffd700"/>
  <path d="M 58 70 Q 60 77 62 88" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.7"/>
  <line x1="62" y1="88" x2="55" y2="95" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="62" y1="88" x2="70" y2="95" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <!-- Connections -->
  <line x1="50" y1="35" x2="60" y2="30" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="60" y1="30" x2="70" y2="35" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="70" y1="35" x2="65" y2="55" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="65" y1="55" x2="58" y2="70" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <!-- Capricorn symbol -->
  <text x="64" y="118" font-size="32" font-weight="bold" text-anchor="middle" fill="#ffd700">♑</text>
</svg>