<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="128" height="128" fill="url(#bgGrad)"/>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#e0e0e0" stroke-width="1" opacity="0.5"/>
  <!-- Water bearer constellation -->
  <!-- Upper figure (person) -->
  <circle cx="50" cy="35" r="3" fill="#ffd700"/>
  <circle cx="55" cy="50" r="3" fill="#ffed4e"/>
  <!-- Arms -->
  <circle cx="35" cy="48" r="2.5" fill="#ffd700"/>
  <circle cx="70" cy="48" r="2.5" fill="#ffd700"/>
  <line x1="50" y1="35" x2="55" y2="50" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="55" y1="50" x2="35" y2="48" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="55" y1="50" x2="70" y2="48" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <!-- Pitcher/Vessel -->
  <circle cx="75" cy="55" r="4" fill="#ffed4e"/>
  <circle cx="75" cy="68" r="3" fill="#ffd700"/>
  <!-- Water stream flowing down -->
  <circle cx="72" cy="80" r="2.5" fill="#ffd700"/>
  <circle cx="75" cy="92" r="2.5" fill="#ffd700"/>
  <circle cx="78" cy="105" r="2.5" fill="#ffd700"/>
  <path d="M 75 68 Q 73 80 74 95 Q 75 105 78 110" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.7"/>
  <!-- Connection -->
  <line x1="55" y1="50" x2="75" y2="55" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
  <!-- Aquarius symbol -->
  <text x="64" y="118" font-size="32" font-weight="bold" text-anchor="middle" fill="#1a1a1a">♒</text>
