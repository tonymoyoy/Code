<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="128" height="128" fill="url(#bgGrad)"/>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <!-- Virgo figure constellation -->
  <circle cx="45" cy="35" r="3" fill="#ffd700"/>
  <circle cx="55" cy="45" r="3" fill="#ffd700"/>
  <circle cx="50" cy="65" r="3" fill="#ffed4e"/>
  <circle cx="60" cy="70" r="3" fill="#ffed4e"/>
  <circle cx="70" cy="60" r="3" fill="#ffd700"/>
  <circle cx="75" cy="40" r="2.5" fill="#ffd700"/>
  <circle cx="65" cy="80" r="3" fill="#ffed4e"/>
  <!-- Lines forming figure -->
  <line x1="45" y1="35" x2="55" y2="45" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="55" y1="45" x2="50" y2="65" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="65" x2="60" y2="70" stroke="#ffed4e" stroke-width="1.5" opacity="0.6"/>
  <line x1="60" y1="70" x2="65" y2="80" stroke="#ffed4e" stroke-width="1.5" opacity="0.6"/>
  <line x1="55" y1="45" x2="70" y2="60" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
  <line x1="70" y1="60" x2="75" y2="40" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
  <!-- Virgo symbol -->
  <text x="64" y="108" font-size="36" font-weight="bold" text-anchor="middle" fill="#ffd700">♍</text>
