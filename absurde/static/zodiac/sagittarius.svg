<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="128" height="128" fill="url(#bgGrad)"/>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#e0e0e0" stroke-width="1" opacity="0.5"/>
  <!-- Archer constellation -->
  <!-- Bow -->
  <circle cx="45" cy="45" r="3" fill="#ffd700"/>
  <circle cx="50" cy="60" r="3" fill="#ffd700"/>
  <path d="M 45 45 Q 48 52 50 60" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.7"/>
  <!-- Arrow pointing right -->
  <line x1="50" y1="60" x2="85" y2="40" stroke="#ffed4e" stroke-width="2" opacity="0.8"/>
  <polygon points="85,40 82,35 83,45" fill="#ffd700" opacity="0.8"/>
  <!-- Archer body -->
  <circle cx="55" cy="55" r="4" fill="#ffed4e"/>
  <circle cx="60" cy="75" r="3" fill="#ffd700"/>
  <!-- Star points -->
  <circle cx="70" cy="50" r="2.5" fill="#ffd700"/>
  <circle cx="75" cy="35" r="2.5" fill="#ffd700"/>
  <circle cx="80" cy="25" r="2.5" fill="#ffd700"/>
  <!-- Connections -->
  <line x1="55" y1="55" x2="60" y2="75" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="60" x2="70" y2="50" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
  <!-- Sagittarius symbol -->
  <text x="64" y="118" font-size="32" font-weight="bold" text-anchor="middle" fill="#1a1a1a">♐</text>
</svg>